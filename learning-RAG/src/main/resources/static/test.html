<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG 知识库测试平台</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
        }

        /* ── 顶栏 ── */
        .header {
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            padding: 0 32px;
            display: flex;
            align-items: center;
            height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .header h1 { font-size: 20px; font-weight: 600; letter-spacing: 0.5px; }

        /* ── 导航标签 ── */
        .nav-tabs {
            background: white;
            padding: 0 32px;
            display: flex;
            border-bottom: 1px solid #e0e0e0;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .nav-tab {
            padding: 16px 24px;
            cursor: pointer;
            font-size: 15px;
            color: #666;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-tab:hover { color: #1a73e8; background: #f5f8ff; }
        .nav-tab.active {
            color: #1a73e8;
            border-bottom-color: #1a73e8;
            font-weight: 600;
        }

        /* ── 页面内容 ── */
        .page { display: none; padding: 32px; max-width: 860px; margin: 0 auto; }
        .page.active { display: block; }
        #page-chat { max-width: 1200px; padding: 24px; }

        /* ── 上传区域 ── */
        .upload-card {
            background: white;
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .upload-card h2 { font-size: 18px; color: #333; margin-bottom: 6px; }
        .upload-card p  { color: #888; font-size: 13px; margin-bottom: 24px; }

        .drop-zone {
            border: 2px dashed #b0c4de;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            background: #fafcff;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #1a73e8;
            background: #e8f0fe;
        }
        .drop-zone .icon { font-size: 40px; margin-bottom: 12px; }
        .drop-zone .hint { color: #555; font-size: 15px; margin-bottom: 6px; }
        .drop-zone .sub  { color: #aaa; font-size: 12px; }
        #fileInput { display: none; }

        .file-info {
            display: none;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: #e8f5e9;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #2e7d32;
        }
        .file-info.show { display: flex; }
        .file-info .remove-btn {
            margin-left: auto;
            cursor: pointer;
            color: #999;
            font-size: 16px;
            line-height: 1;
        }
        .file-info .remove-btn:hover { color: #e53935; }

        .btn-primary {
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 28px;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }
        .btn-primary:hover:not(:disabled) { background: #1558b0; }
        .btn-primary:disabled { background: #b0bec5; cursor: not-allowed; }

        .upload-log {
            margin-top: 20px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .upload-log.show { display: block; }
        .upload-log.success { background: #e8f5e9; color: #2e7d32; border-left: 4px solid #4caf50; }
        .upload-log.error   { background: #ffebee; color: #c62828; border-left: 4px solid #ef5350; }
        .upload-log.info    { background: #e3f2fd; color: #1565c0; border-left: 4px solid #42a5f5; }

        /* 上传历史 */
        .history-title { font-size: 15px; font-weight: 600; color: #555; margin: 28px 0 12px; }
        .history-list  { list-style: none; }
        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: #fafafa;
            border-radius: 8px;
            margin-bottom: 8px;
            font-size: 13px;
            color: #444;
            border: 1px solid #eee;
        }
        .history-item .badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            background: #e8f0fe;
            color: #1a73e8;
            white-space: nowrap;
        }
        .history-item .time { margin-left: auto; color: #bbb; font-size: 12px; }

        /* ── 聊天区域 ── */
        .chat-wrap {
            background: #eceff3;
            border-radius: 18px;
            border: 1px solid #d8dde6;
            box-shadow: 0 14px 32px rgba(15, 23, 42, 0.10);
            display: flex;
            flex-direction: column;
            height: calc(100vh - 180px);
            min-height: 500px;
            overflow: hidden;
        }
        .chat-header {
            padding: 14px 22px;
            border-bottom: 1px solid #d8dde6;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(180deg, #f8fafc 0%, #eef2f6 100%);
        }
        .chat-header span { font-size: 15px; font-weight: 600; color: #1f2937; }
        .btn-clear {
            background: rgba(255,255,255,0.88);
            border: 1px solid #d6dbe3;
            border-radius: 999px;
            padding: 6px 14px;
            font-size: 13px;
            color: #667085;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-clear:hover { border-color: #ef5350; color: #ef5350; background: #fff5f5; }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 18px 18px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            background:
                radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 26%),
                linear-gradient(180deg, #f1f3f5 0%, #e8ebef 100%);
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

        /* 欢迎占位 */
        .chat-placeholder {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #98a2b3;
            font-size: 14px;
            gap: 12px;
            text-align: center;
        }
        .chat-placeholder .ph-icon { font-size: 48px; }

        /* 气泡 */
        .msg {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }
        .msg-main {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            width: 100%;
        }
        .msg.user .msg-main {
            flex-direction: row-reverse;
        }
        .avatar {
            width: 40px; height: 40px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.10);
        }
        .msg.user  .avatar {
            background: linear-gradient(135deg, #34d399, #10b981);
            color: white;
        }
        .msg.bot   .avatar {
            background: linear-gradient(135deg, #ffffff, #eef2f7);
            color: #334155;
            border: 1px solid #dbe3ec;
        }
        .msg-content {
            min-width: 0;
            max-width: min(78%, 720px);
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }
        .msg.user .msg-content {
            align-items: flex-end;
            margin-left: auto;
        }
        .bubble {
            position: relative;
            max-width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 15px;
            line-height: 1.7;
            overflow-wrap: break-word;
            white-space: pre-wrap;
            width: fit-content;
            box-shadow: 0 6px 14px rgba(15, 23, 42, 0.06);
        }
        .msg.user .bubble {
            background: #95ec69;
            color: #1f2937;
            border-top-right-radius: 3px;
        }
        .msg.bot  .bubble {
            background: #ffffff;
            color: #1f2937;
            border-top-left-radius: 3px;
        }
        .bubble::after {
            content: '';
            position: absolute;
            top: 12px;
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
        }
        .msg.user .bubble::after {
            right: -6px;
            border-left: 8px solid #95ec69;
        }
        .msg.bot .bubble::after {
            left: -6px;
            border-right: 8px solid #ffffff;
        }
        /* Markdown 样式支持 */
        .bubble h1, .bubble h2, .bubble h3, .bubble h4 {
            margin: 12px 0 8px 0;
            font-weight: 600;
            line-height: 1.4;
        }
        .bubble h1 { font-size: 20px; }
        .bubble h2 { font-size: 18px; }
        .bubble h3 { font-size: 16px; }
        .bubble p { margin: 8px 0; }
        .bubble ul, .bubble ol {
            margin: 8px 0;
            padding-left: 24px;
        }
        .bubble li { margin: 4px 0; }
        .bubble code {
            background: rgba(0,0,0,0.06);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
        }
        .msg.user .bubble code {
            background: rgba(255,255,255,0.28);
        }
        .bubble pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 14px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 10px 0;
        }
        .bubble pre code {
            background: none;
            padding: 0;
            color: inherit;
        }
        .bubble blockquote {
            border-left: 4px solid #1a73e8;
            padding-left: 12px;
            margin: 10px 0;
            color: #666;
            font-style: italic;
        }
        .bubble strong { font-weight: 600; color: #1a73e8; }
        .msg.user .bubble strong { color: inherit; }
        .bubble em { font-style: italic; }
        .bubble a {
            color: #1a73e8;
            text-decoration: underline;
        }
        .bubble table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
        }
        .bubble th, .bubble td {
            border: 1px solid #ddd;
            padding: 8px 12px;
            text-align: left;
        }
        .bubble th {
            background: #f5f5f5;
            font-weight: 600;
        }
        .msg-time {
            font-size: 11px;
            color: #7b8794;
            align-self: center;
            background: rgba(80, 94, 113, 0.10);
            padding: 3px 10px;
            border-radius: 999px;
            line-height: 1.4;
        }

        /* 打字动画 */
        .typing-dots span {
            display: inline-block;
            width: 7px; height: 7px;
            background: #aaa;
            border-radius: 50%;
            margin: 0 2px;
            animation: blink 1.2s infinite;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
            40% { opacity: 1; transform: scale(1); }
        }

        /* 输入栏 */
        .chat-input-bar {
            padding: 14px 18px 18px;
            border-top: 1px solid #d8dde6;
            display: flex;
            gap: 12px;
            align-items: flex-end;
            background: linear-gradient(180deg, #f5f6f7 0%, #eef1f4 100%);
        }
        .chat-input-bar textarea {
            flex: 1;
            border: 1px solid #d6dbe3;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 15px;
            font-family: inherit;
            resize: none;
            line-height: 1.6;
            max-height: 150px;
            min-height: 44px;
            outline: none;
            transition: all 0.2s;
            background: white;
        }
        .chat-input-bar textarea:focus {
            border-color: #07c160;
            box-shadow: 0 0 0 3px rgba(7, 193, 96, 0.12);
        }
        .btn-send {
            background: #07c160;
            color: white;
            border: none;
            border-radius: 10px;
            min-width: 72px;
            height: 44px;
            padding: 0 18px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .btn-send:hover:not(:disabled) { background: #06ad56; }
        .btn-send:disabled { background: #b0bec5; cursor: not-allowed; }

        @media (max-width: 768px) {
            #page-chat { padding: 12px; }
            .chat-wrap {
                height: calc(100vh - 140px);
                min-height: 420px;
                border-radius: 14px;
            }
            .chat-header,
            .chat-input-bar {
                padding-left: 14px;
                padding-right: 14px;
            }
            .chat-messages {
                padding: 16px 12px 20px;
            }
            .msg-content {
                max-width: calc(100% - 50px);
            }
            .avatar {
                width: 36px;
                height: 36px;
            }
            .btn-send {
                min-width: 64px;
                height: 42px;
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🤖 RAG 知识库测试平台</h1>
    </div>

    <div class="nav-tabs">
        <div class="nav-tab active" data-page="upload">
            <span>📤</span> 文档上传
        </div>
        <div class="nav-tab" data-page="chat">
            <span>💬</span> 知识库问答
        </div>
    </div>

    <!-- ===== 上传页 ===== -->
    <div class="page active" id="page-upload">
        <div class="upload-card">
            <h2>上传知识文档</h2>
            <p>支持 PDF、Word (.doc/.docx)、TXT、Markdown、HTML、Excel、PowerPoint 等格式</p>

            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                <div class="icon">📂</div>
                <div class="hint">点击选择文件，或将文件拖拽到此处</div>
                <div class="sub">单次上传一个文件</div>
            </div>
            <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt,.md,.html,.htm,.xls,.xlsx,.ppt,.pptx,.csv">

            <div class="file-info" id="fileInfo">
                <span>📄</span>
                <span id="fileName"></span>
                <span id="fileSize" style="color:#aaa; font-size:12px;"></span>
                <span class="remove-btn" onclick="clearFile()">✕</span>
            </div>

            <button class="btn-primary" id="uploadBtn" onclick="uploadFile()" disabled>上传文档</button>

            <div class="upload-log" id="uploadLog"></div>

            <!-- 本次会话上传历史 -->
            <div id="historySection" style="display:none">
                <div class="history-title">本次上传记录</div>
                <ul class="history-list" id="historyList"></ul>
            </div>
        </div>
    </div>

    <!-- ===== 聊天页 ===== -->
    <div class="page" id="page-chat">
        <div class="chat-wrap">
            <div class="chat-header">
                <span>基于知识库的问答</span>
                <button class="btn-clear" onclick="clearChat()">清空对话</button>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="chat-placeholder" id="chatPlaceholder">
                    <div class="ph-icon">💬</div>
                    <div>在下方输入问题，AI 将基于已上传的知识库内容回答</div>
                    <div style="font-size:12px;">Shift + Enter 换行 &nbsp;·&nbsp; Enter 发送</div>
                </div>
            </div>

            <div class="chat-input-bar">
                <textarea id="questionInput" rows="1"
                    placeholder="输入问题… (Enter 发送，Shift+Enter 换行)"
                    oninput="autoResize(this)"></textarea>
                <button class="btn-send" id="sendBtn" onclick="sendMessage()" title="发送">发送</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/ai';

        /* ────────────── 标签切换 ────────────── */
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('page-' + tab.dataset.page).classList.add('active');
            });
        });

        /* ────────────── 文件上传 ────────────── */
        const dropZone  = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileInfo  = document.getElementById('fileInfo');
        const uploadBtn = document.getElementById('uploadBtn');

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length > 0) showFileInfo(fileInput.files[0]);
        });

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const f = e.dataTransfer.files[0];
            if (f) { fileInput.files = e.dataTransfer.files; showFileInfo(f); }
        });

        function showFileInfo(file) {
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatSize(file.size);
            fileInfo.classList.add('show');
            uploadBtn.disabled = false;
        }

        function clearFile() {
            fileInput.value = '';
            fileInfo.classList.remove('show');
            uploadBtn.disabled = true;
            setLog('', '');
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1024 / 1024).toFixed(2) + ' MB';
        }

        async function uploadFile() {
            if (!fileInput.files || fileInput.files.length === 0) return;
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            uploadBtn.disabled = true;
            uploadBtn.textContent = '上传中…';
            setLog('正在上传文件：' + file.name + '，请稍候…', 'info');

            try {
                const res = await fetch(`${API_BASE}/upload`, { method: 'POST', body: formData });
                const text = await res.text();
                if (res.ok) {
                    setLog('✅ ' + text, 'success');
                    addHistory(file.name, formatSize(file.size));
                    clearFile();
                } else {
                    setLog('❌ 上传失败：' + text, 'error');
                }
            } catch (e) {
                setLog('❌ 网络错误：' + e.message, 'error');
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = '上传文档';
            }
        }

        function setLog(msg, type) {
            const el = document.getElementById('uploadLog');
            if (!msg) { el.className = 'upload-log'; el.textContent = ''; return; }
            el.className = 'upload-log show ' + type;
            el.textContent = msg;
        }

        function addHistory(name, size) {
            const section = document.getElementById('historySection');
            const list    = document.getElementById('historyList');
            section.style.display = 'block';
            const li = document.createElement('li');
            li.className = 'history-item';
            const now = new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            li.innerHTML = `<span>📄</span><span>${name}</span>
                            <span class="badge">${size}</span>
                            <span class="time">${now}</span>`;
            list.prepend(li);
        }

        /* ────────────── 聊天问答 ────────────── */
        // 仅在内存中维护本轮对话历史，不写入数据库
        const chatHistory = [];

        function now() {
            return new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
        }

        document.getElementById('questionInput').addEventListener('keydown', e => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        });

        async function sendMessage() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            if (!question) return;

            hidePlaceholder();

            // 渲染用户消息
            appendMsg('user', question, now());
            chatHistory.push({ role: 'user', content: question });
            input.value = '';
            input.style.height = 'auto';
            document.getElementById('sendBtn').disabled = true;

            // 显示打字动画，随后复用此 div 展示流式内容
            const botDiv = appendTyping();

            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(question)
                });

                if (!res.ok) {
                    const text = await res.text();
                    removeTyping(botDiv);
                    appendMsg('bot', '❌ 请求失败：' + text, now());
                } else {
                    // 流式读取 SSE
                    const reader = res.body.getReader();
                    const decoder = new TextDecoder();
                    let answer = '';
                    let buffer = ''; // 缓冲区，用于处理跨块的数据

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        // 解码并添加到缓冲区
                        buffer += decoder.decode(value, { stream: true });
                        
                        // 按行分割处理
                        const lines = buffer.split('\n');
                        // 保留最后一个可能不完整的行
                        buffer = lines.pop() || '';
                        
                        for (const line of lines) {
                            const trimmedLine = line.trim();
                            // 跳过空行和注释
                            if (!trimmedLine || trimmedLine.startsWith(':')) continue;
                            
                            if (trimmedLine.startsWith('data:')) {
                                const chunk = trimmedLine.substring(5).trim();
                                if (chunk === '[DONE]') continue;
                                if (chunk) {
                                    answer += chunk;
                                    updateTypingContent(botDiv, answer);
                                }
                            }
                        }
                    }
                    
                    // 处理缓冲区中剩余的数据
                    if (buffer.trim()) {
                        const trimmedBuffer = buffer.trim();
                        if (trimmedBuffer.startsWith('data:')) {
                            const chunk = trimmedBuffer.substring(5).trim();
                            if (chunk && chunk !== '[DONE]') {
                                answer += chunk;
                                updateTypingContent(botDiv, answer);
                            }
                        }
                    }

                    // 流完成：直接复用 botDiv 作为最终消息，不再新建
                    chatHistory.push({ role: 'bot', content: answer });
                }
            } catch (e) {
                removeTyping(botDiv);
                appendMsg('bot', '❌ 网络错误：' + e.message, now());
            } finally {
                document.getElementById('sendBtn').disabled = false;
                input.focus();
            }
        }

        function hidePlaceholder() {
            const ph = document.getElementById('chatPlaceholder');
            if (ph) ph.remove();
        }

        function appendMsg(role, text, time) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'msg ' + role;

            const isUser = role === 'user';
            // 对 bot 消息使用 Markdown 渲染，用户消息纯文本
            const content = isUser ? escapeHtml(text) : renderMarkdown(text);
            div.innerHTML = `
                <div class="msg-time">${time}</div>
                <div class="msg-main">
                    <div class="avatar">${isUser ? '我' : 'AI'}</div>
                    <div class="msg-content">
                        <div class="bubble">${content}</div>
                    </div>
                </div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function appendTyping() {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = 'msg bot';
            div.innerHTML = `
                <div class="msg-time">${now()}</div>
                <div class="msg-main">
                    <div class="avatar">AI</div>
                    <div class="msg-content">
                        <div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>
                    </div>
                </div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return div;
        }

        function removeTyping(el) {
            if (el) el.remove();
        }

        function updateTypingContent(botDiv, content) {
            const bubble = botDiv.querySelector('.bubble');
            if (bubble) bubble.innerHTML = renderMarkdown(content);
            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        }

        function clearChat() {
            chatHistory.length = 0;
            const container = document.getElementById('chatMessages');
            container.innerHTML = `
                <div class="chat-placeholder" id="chatPlaceholder">
                    <div class="ph-icon">💬</div>
                    <div>在下方输入问题，AI 将基于已上传的知识库内容回答</div>
                    <div style="font-size:12px;">Shift + Enter 换行 &nbsp;·&nbsp; Enter 发送</div>
                </div>`;
        }

        function escapeHtml(str) {
            return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // 简单的 Markdown 渲染器
        function renderMarkdown(text) {
            if (!text) return '';
            
            let html = text;
            
            // 代码块 (```code```)
            html = html.replace(/```([\s\S]*?)```/g, (match, code) => {
                return `<pre><code>${escapeHtml(code.trim())}</code></pre>`;
            });
            
            // 行内代码 (`code`)
            html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // 标题 (### ## #)
            html = html.replace(/^#### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');
            
            // 粗体 (**text**)
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            
            // 斜体 (*text*)
            html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
            
            // 引用 (> text)
            html = html.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
            
            // 无序列表 (- item)
            html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>');
            
            // 有序列表 (1. item)
            html = html.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
            
            // 链接 [text](url)
            html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // 换行符转 <br>
            html = html.replace(/\n/g, '<br>');
            
            // 清理多余的 <br> 标签在块级元素周围
            html = html.replace(/<br>(<\/?(?:h[1-4]|ul|ol|li|pre|blockquote)>)/g, '$1');
            html = html.replace(/(<\/?(?:h[1-4]|ul|ol|li|pre|blockquote)>)<br>/g, '$1');
            
            return html;
        }
    </script>
</body>
</html>
